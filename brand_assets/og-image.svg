<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cream background with warm grain texture suggestion via subtle radial gradient -->
    <radialGradient id="bgGrad" cx="30%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#FBF6F5"/>
      <stop offset="100%" stop-color="#F0E8E6"/>
    </radialGradient>
    <!-- Soft rose glow in top-right -->
    <radialGradient id="glowTopRight" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#F2C4CE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F7F0EF" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft rose glow bottom-left -->
    <radialGradient id="glowBottomLeft" cx="0%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#E0828F" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F7F0EF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glowTopRight)"/>
  <rect width="1200" height="630" fill="url(#glowBottomLeft)"/>

  <!-- Outer border — thin rose line, inset 24px -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#E0828F" stroke-width="0.5" opacity="0.4"/>

  <!-- Decorative horizontal line above wordmark -->
  <line x1="390" y1="238" x2="810" y2="238" stroke="#E0828F" stroke-width="0.5" opacity="0.7"/>

  <!-- FLEYA wordmark — Cormorant Garamond style, rose -->
  <text
    x="600"
    y="348"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="108"
    font-weight="300"
    fill="#E0828F"
    letter-spacing="28"
  >FLEYA</text>

  <!-- Decorative horizontal line below wordmark -->
  <line x1="390" y1="375" x2="810" y2="375" stroke="#E0828F" stroke-width="0.5" opacity="0.7"/>

  <!-- Tagline — Jost style, mauve, small caps -->
  <text
    x="600"
    y="415"
    text-anchor="middle"
    font-family="'Jost', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="13"
    font-weight="300"
    fill="#B85A68"
    letter-spacing="7"
  >ACCESSORIES FOR WOMEN</text>

  <!-- URL — very small, bottom center -->
  <text
    x="600"
    y="574"
    text-anchor="middle"
    font-family="'Jost', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="11"
    font-weight="300"
    fill="#B85A68"
    letter-spacing="4"
    opacity="0.6"
  >FLEYA.NL</text>

  <!-- Corner accent dots — top-left and bottom-right -->
  <circle cx="48" cy="48" r="2" fill="#E0828F" opacity="0.5"/>
  <circle cx="1152" cy="582" r="2" fill="#E0828F" opacity="0.5"/>
</svg>
