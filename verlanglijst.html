<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verlanglijst — Fleya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose:     '#E0828F',
            petal:    '#F2C4CE',
            mauve:    '#B85A68',
            cream:    '#F7F0EF',
            espresso: '#2A2220',
          },
          fontFamily: {
            heading: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body:    ['Jost', '"Helvetica Neue"', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #F7F0EF;
      color: #2A2220;
      font-family: 'Jost', 'Helvetica Neue', sans-serif;
      font-weight: 300;
      letter-spacing: 0.08em;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    /* ── Buttons ── */
    .btn-primary {
      background-color: #E0828F;
      color: #F7F0EF;
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 12px 28px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      display: inline-block;
      text-decoration: none;
      transition: background-color 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .btn-primary:hover  { background-color: #B85A68; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:focus-visible { outline: 2px solid #B85A68; outline-offset: 3px; }

    .btn-ghost-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(42,34,32,0.35);
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 4px 0;
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-ghost-remove:hover { color: #B85A68; }

    /* ── Deco line ── */
    .deco-line {
      display: block;
      width: 52px;
      height: 0.5px;
      background-color: #E0828F;
    }
    .deco-line-center { margin: 0 auto; }

    /* ── Nav ── */
    .nav-link {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #2A2220;
      text-decoration: none;
      transition: color 0.25s ease;
    }
    .nav-link:hover      { color: #E0828F; }
    .nav-link:focus-visible { outline: 1px dotted #E0828F; }

    #navbar {
      background-color: rgba(247, 240, 239, 0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 1px 0 rgba(224,130,143,0.14);
    }

    /* ── Grain ── */
    .grain-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.022;
    }

    /* ── Wishlist card ── */
    .wish-item {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 24px 0;
      border-bottom: 0.5px solid rgba(42,34,32,0.09);
      transition: opacity 0.3s ease, transform 0.3s ease, max-height 0.4s ease;
    }

    /* ── Fade-up ── */
    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease,
                  transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* ── Mobile menu overlay ── */
    #mobile-menu {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #F7F0EF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-12px);
      transition: opacity 0.35s cubic-bezier(0.25,0.46,0.45,0.94),
                  transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    #mobile-menu.open { opacity: 1; pointer-events: all; transform: translateY(0); }
    .mobile-nav-link {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 32px;
      letter-spacing: 0.08em;
      color: #2A2220;
      text-decoration: none;
      transition: color 0.25s ease;
    }
    .mobile-nav-link:hover { color: #E0828F; }
    #mobile-menu-close {
      position: absolute;
      top: 24px;
      right: 28px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }
  </style>
</head>
<body>

<!-- MOBILE MENU OVERLAY -->
<div id="mobile-menu" role="dialog" aria-modal="true" aria-label="Navigatiemenu">
  <button id="mobile-menu-close" aria-label="Menu sluiten">
    <span style="display:block;width:22px;height:0.5px;background:#2A2220;transform:rotate(45deg) translate(3px,3px);"></span>
    <span style="display:block;width:22px;height:0.5px;background:#2A2220;transform:rotate(-45deg) translate(3px,-3px);"></span>
  </button>
  <span class="deco-line deco-line-center" style="margin-bottom:12px;"></span>
  <a href="index.html#collection" class="mobile-nav-link">Collectie</a>
  <a href="about.html"            class="mobile-nav-link">Over</a>
  <a href="journal.html"          class="mobile-nav-link">Blog</a>
  <a href="verlanglijst.html"     class="mobile-nav-link">Verlanglijst</a>
  <a href="winkelwagen.html"      class="mobile-nav-link">Winkelwagen</a>
  <span class="deco-line deco-line-center" style="margin-top:12px;"></span>
</div>

<!-- GRAIN TEXTURE -->
<svg class="grain-overlay" xmlns="http://www.w3.org/2000/svg">
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain)"/>
</svg>

<!-- NAVIGATION -->
<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 py-5 px-8 lg:px-16">
  <div class="max-w-7xl mx-auto flex items-center justify-between">

    <div class="hidden lg:flex items-center gap-10">
      <a href="index.html#collection" class="nav-link">Collectie</a>
      <a href="about.html"            class="nav-link">Over</a>
    </div>

    <div class="flex-1 lg:flex-none flex justify-start lg:justify-center">
      <a href="index.html" aria-label="Fleya home"
         style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:2.6rem;letter-spacing:0.22em;color:#E0828F;text-decoration:none;">FLEYA</a>
    </div>

    <div class="hidden lg:flex items-center gap-10">
      <a href="journal.html" class="nav-link">Blog</a>
      <a href="verlanglijst.html" class="nav-link" aria-label="Verlanglijst" style="position:relative;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#E0828F" stroke="#E0828F" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span id="nav-wish-badge" style="position:absolute;top:-6px;right:-8px;width:16px;height:16px;background:#E0828F;border-radius:50%;font-family:'Jost',sans-serif;font-size:9px;font-weight:500;color:#fff;display:none;align-items:center;justify-content:center;letter-spacing:0;"></span>
      </a>
      <a href="winkelwagen.html" class="nav-link" style="position:relative;">
        <span style="display:flex;align-items:center;gap:6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Winkelwagen
        </span>
        <span id="nav-cart-badge" style="position:absolute;top:-6px;right:-8px;width:16px;height:16px;background:#E0828F;border-radius:50%;font-family:'Jost',sans-serif;font-size:9px;font-weight:500;color:#fff;display:none;align-items:center;justify-content:center;letter-spacing:0;"></span>
      </a>
    </div>

    <button id="hamburger" class="lg:hidden flex flex-col gap-1.5 p-1" aria-label="Menu openen">
      <span style="display:block;width:22px;height:0.5px;background:#2A2220;"></span>
      <span style="display:block;width:16px;height:0.5px;background:#2A2220;"></span>
    </button>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="pt-28 pb-0 px-8 lg:px-16">
  <div class="max-w-7xl mx-auto">
    <nav aria-label="breadcrumb" class="flex items-center gap-2.5 mb-10">
      <a href="index.html" style="font-family:'Jost',sans-serif;font-size:10px;font-weight:300;letter-spacing:0.16em;text-transform:uppercase;color:rgba(42,34,32,0.5);text-decoration:none;transition:color 0.2s ease;" onmouseover="this.style.color='#E0828F'" onmouseout="this.style.color='rgba(42,34,32,0.5)'">Home</a>
      <span style="color:rgba(42,34,32,0.3);font-size:10px;">—</span>
      <span style="font-family:'Jost',sans-serif;font-size:10px;font-weight:300;letter-spacing:0.16em;text-transform:uppercase;color:#2A2220;">Verlanglijst</span>
    </nav>

    <div class="flex items-center gap-4 mb-2 fade-up">
      <span class="deco-line"></span>
      <span style="font-family:'Jost',sans-serif;font-size:10px;font-weight:400;letter-spacing:0.22em;text-transform:uppercase;color:#E0828F;">Mijn collectie</span>
    </div>
    <h1 class="fade-up" style="font-size:clamp(2rem,4vw,3rem);font-weight:300;letter-spacing:0.05em;color:#2A2220;margin-bottom:4px;transition-delay:0.06s;">
      Verlanglijst
    </h1>
    <p id="wish-count-label" class="fade-up" style="font-family:'Jost',sans-serif;font-size:12px;font-weight:300;letter-spacing:0.12em;color:rgba(42,34,32,0.45);margin-bottom:0;transition-delay:0.1s;"></p>
  </div>
</div>

<!-- WISHLIST CONTENT -->
<section class="px-8 lg:px-16 py-10">
  <div class="max-w-7xl mx-auto">

    <div id="wish-content">
      <!-- Items rendered by JS -->
    </div>

    <!-- EMPTY STATE -->
    <div id="empty-state" class="text-center" style="padding:80px 0;display:none;">
      <div style="margin-bottom:24px;opacity:0.2;">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#2A2220" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <span class="deco-line" style="margin:0 auto 20px;"></span>
      <h2 style="font-size:1.8rem;font-weight:300;letter-spacing:0.06em;margin-bottom:8px;">Je verlanglijst is leeg</h2>
      <p style="font-family:'Jost',sans-serif;font-size:12px;font-weight:300;letter-spacing:0.12em;color:rgba(42,34,32,0.55);margin-bottom:36px;">
        Bewaar producten die je mooi vindt en bekijk ze hier terug.
      </p>
      <a href="index.html#collection" class="btn-primary" style="padding:14px 48px;">
        Ontdek de collectie
      </a>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer style="border-top:0.5px solid rgba(42,34,32,0.1);padding:32px;text-align:center;">
  <p style="font-family:'Jost',sans-serif;font-size:10px;font-weight:300;letter-spacing:0.18em;text-transform:uppercase;color:rgba(42,34,32,0.35);">
    © 2026 Fleya — Accessoires voor vrouwen
  </p>
</footer>

<!-- JAVASCRIPT -->
<script>
  /* ── Product image map by colorKey ── */
  const productImages = {
    black:  'product_images/bagholder-zwart.jpg',
    gold:   'product_images/bagholder-goud.jpg',
    silver: 'product_images/bagholder-zilver.jpg',
    rose:   'product_images/bagholder-roze.jpg',
  };

  function getWishlist() {
    return JSON.parse(localStorage.getItem('fleya-wishlist') || '[]');
  }

  function saveWishlist(list) {
    localStorage.setItem('fleya-wishlist', JSON.stringify(list));
    localStorage.setItem('fleya-wishlist-count', list.length);
    updateBadge(list.length);
  }

  function updateBadge(count) {
    var b = document.getElementById('nav-wish-badge');
    if (b) { b.textContent = count; b.style.display = count > 0 ? 'flex' : 'none'; }
  }

  function buildProductIllustration(colorKey, name, color) {
    const imgSrc = productImages[colorKey] || productImages.black;
    return `
      <a href="product.html" style="display:block;flex-shrink:0;border-radius:8px;overflow:hidden;box-shadow:0 4px 20px rgba(224,130,143,0.12);">
        <img src="${imgSrc}" alt="${name} — ${color}"
             style="width:88px;height:116px;object-fit:cover;display:block;border-radius:8px;">
      </a>`;
  }

  function renderWishlist() {
    const wishlist = getWishlist();
    const container = document.getElementById('wish-content');
    const emptyState = document.getElementById('empty-state');
    const countLabel = document.getElementById('wish-count-label');

    updateBadge(wishlist.length);

    if (wishlist.length === 0) {
      container.innerHTML = '';
      emptyState.style.display = 'block';
      countLabel.textContent = '';
      return;
    }

    emptyState.style.display = 'none';
    countLabel.textContent = wishlist.length + ' ' + (wishlist.length === 1 ? 'product' : 'producten');

    container.innerHTML = `
      <div style="border-top:0.5px solid rgba(42,34,32,0.09);">
        ${wishlist.map((item, i) => `
          <div class="wish-item" id="wish-item-${i}" data-index="${i}">
            <!-- Product image -->
            ${buildProductIllustration(item.colorKey, item.name, item.color)}

            <!-- Info -->
            <div style="flex:1;min-width:0;">
              <p style="font-family:'Jost',sans-serif;font-size:10px;font-weight:400;letter-spacing:0.2em;text-transform:uppercase;color:#E0828F;margin-bottom:4px;">Accessoires</p>
              <h3 style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.3rem;letter-spacing:0.04em;color:#2A2220;margin-bottom:2px;">${item.name}</h3>
              <p style="font-family:'Jost',sans-serif;font-size:11px;font-weight:300;letter-spacing:0.1em;color:rgba(42,34,32,0.5);margin-bottom:10px;">${item.color}</p>
              <p style="font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:400;letter-spacing:0.04em;color:#2A2220;">€ ${item.price.toFixed(2).replace('.', ',')}</p>
            </div>

            <!-- Actions -->
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:12px;flex-shrink:0;">
              <a href="product.html" class="btn-primary" style="white-space:nowrap;font-size:10px;padding:10px 20px;">
                Bekijk product
              </a>
              <button class="btn-ghost-remove" onclick="removeItem(${i})">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                Verwijder
              </button>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function removeItem(index) {
    const wishlist = getWishlist();
    const row = document.getElementById('wish-item-' + index);

    if (row) {
      row.style.overflow = 'hidden';
      const h = row.offsetHeight;
      row.style.maxHeight = h + 'px';
      requestAnimationFrame(() => {
        row.style.opacity = '0';
        row.style.transform = 'translateX(-12px)';
        row.style.maxHeight = '0';
        row.style.paddingTop = '0';
        row.style.paddingBottom = '0';
      });
      setTimeout(() => {
        wishlist.splice(index, 1);
        saveWishlist(wishlist);
        renderWishlist();
      }, 380);
    } else {
      wishlist.splice(index, 1);
      saveWishlist(wishlist);
      renderWishlist();
    }
  }

  /* ── Mobile menu ── */
  const hamburger  = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  const menuClose  = document.getElementById('mobile-menu-close');
  hamburger?.addEventListener('click',  () => { mobileMenu.classList.add('open'); document.body.style.overflow = 'hidden'; });
  menuClose?.addEventListener('click',  () => { mobileMenu.classList.remove('open'); document.body.style.overflow = ''; });
  mobileMenu?.addEventListener('click', e => { if (e.target === mobileMenu) { mobileMenu.classList.remove('open'); document.body.style.overflow = ''; } });
  mobileMenu?.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { mobileMenu.classList.remove('open'); document.body.style.overflow = ''; }));

  /* ── Fade-up on scroll ── */
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.08 });
  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

  /* ── Init ── */
  renderWishlist();
</script>
<script>
(function(){
  var n = parseInt(localStorage.getItem('fleya-cart-count') || '0', 10);
  var b = document.getElementById('nav-cart-badge');
  if (b && n > 0) { b.textContent = n; b.style.display = 'flex'; }
})();
</script>
</body>
</html>
